<html lang="pt-BR">

<head>

    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --border-color: #333333;
            --text-primary: #e0e0e0;
            --text-secondary: #9e9e9e;
            --accent-color: #4CAF50;
            --accent-hover: #45a049;
            --header-height: 70px;
            --font-family: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-family);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header & Nav */
        .clean-header {
            height: var(--header-height);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        .logo a {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
            letter-spacing: 1px;
        }

        .accent-text {
            color: var(--accent-color);
        }

        nav ul {
            list-style: none;
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            transition: color 0.2s ease;
        }

        .nav-link:hover,
        .active-link {
            color: var(--text-primary);
        }

        /* Language Switcher */
        .lang-switcher {
            display: flex;
            gap: 10px;
            border-left: 1px solid var(--border-color);
            padding-left: 20px;
        }

        .lang-btn {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .lang-btn:hover {
            color: var(--text-primary);
            border-color: var(--text-secondary);
        }

        .lang-btn.active {
            background-color: var(--accent-color);
            color: #fff;
            border-color: var(--accent-color);
        }

        .borgemenu {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            z-index: 1001;
        }

        .borgemenu span {
            width: 25px;
            height: 2px;
            background-color: var(--text-primary);
            transition: 0.3s;
        }

        /* Main Container */
        .container {
            margin-top: var(--header-height);
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 50px 5%;
            transition: opacity 0.3s ease;
        }

        /* Utilities */
        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 30px;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            border-color: #555;
        }

        .primary-btn,
        .secondary-btn {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 500;
            text-decoration: none;
            font-size: 15px;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
        }

        .primary-btn {
            background-color: var(--accent-color);
            color: #fff;
        }

        .primary-btn:hover {
            background-color: var(--accent-hover);
        }

        .secondary-btn {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .secondary-btn:hover {
            border-color: var(--text-secondary);
        }

        /* Hero Section */
        .hero-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - var(--header-height) - 100px);
        }

        .hero-content {
            text-align: center;
            max-width: 700px;
        }

        .greeting {
            font-size: 20px;
            color: var(--accent-color);
            margin-bottom: 15px;
            font-weight: 500;
        }

        .hero-title {
            font-size: 56px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #fff;
            letter-spacing: -1px;
        }

        .hero-subtitle {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .hero-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        /* About Section */
        .title-center {
            text-align: center;
            font-size: 32px;
            margin-bottom: 50px;
            color: #fff;
        }

        .about-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
        }

        .about-grid h3 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .about-grid p {
            color: var(--text-secondary);
            line-height: 1.6;
            font-size: 15px;
        }

        .skills-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
        }

        .skills-tags span {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 500;
        }

        /* Contact Section */
        .contact-section {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - var(--header-height) - 100px);
        }

        .blog-card {
            max-width: 600px;
        }

        .blog-card img {
            transition: transform 0.3s ease;
        }

        .blog-card:hover img {
            transform: scale(1.02);
        }

        .contact-card,
        .architecture-card {
            width: 100%;
            max-width: 450px;
        }

        .architecture-card h3 {
            color: var(--accent-color);
            margin-bottom: 15px;
            font-size: 18px;
        }

        .architecture-card p {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 15px;
            font-size: 14.5px;
        }

        .contact-card h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #fff;
            text-align: center;
        }

        .contact-card .subtitle {
            color: var(--text-secondary);
            margin-bottom: 30px;
            text-align: center;
            font-size: 15px;
        }

        .modern-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 12px;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .input-group textarea {
            height: 120px;
            resize: vertical;
        }

        .input-group input:focus,
        .input-group textarea:focus {
            border-color: var(--accent-color);
        }

        .submit-btn {
            width: 100%;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .submit-btn.loading {
            opacity: 0.7;
            cursor: wait;
        }

        .submit-btn.success {
            background-color: #2e7d32;
        }

        .submit-btn.error {
            background-color: #d32f2f;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 25px;
            color: var(--text-secondary);
            font-size: 14px;
            border-top: 1px solid var(--border-color);
            background-color: var(--surface-color);
        }

        .heart {
            color: #ef5350;
            margin-left: 5px;
        }

        /* Popup de Idiomas */
        #lang-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(18, 18, 18, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            transition: opacity 0.3s ease;
            padding: 20px;
        }

        #lang-popup.lang-popup-hidden {
            opacity: 0;
            pointer-events: none;
            display: none !important;
        }

        .popup-box {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            animation: popupScaleUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .popup-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 24px;
            line-height: 1.4;
        }

        .popup-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .popup-btn {
            background-color: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 14px 20px;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: var(--font-family);
            text-align: left;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .popup-btn:hover {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            color: #fff;
            transform: translateY(-2px);
        }

        @keyframes popupScaleUp {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .borgemenu {
                display: flex;
            }

            nav ul {
                position: fixed;
                top: var(--header-height);
                right: -100%;
                height: calc(100vh - var(--header-height));
                width: 100%;
                background-color: var(--surface-color);
                flex-direction: column;
                align-items: center;
                justify-content: center;
                transition: right 0.3s ease;
                border-top: 1px solid var(--border-color);
            }

            nav ul.active {
                right: 0;
            }

            .lang-switcher {
                border-left: none;
                padding-left: 0;
                margin-top: 20px;
            }

            .hero-title {
                font-size: 40px;
            }
        }

        @media (max-width: 480px) {
            .popup-box {
                padding: 24px 16px;
            }

            .popup-title {
                font-size: 1.1rem;
            }

            .popup-btn {
                padding: 12px 16px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>

        // URL oficial da sua API Flask rodando no Google Cloud Run

        // Event delegation para os cliques nos links de navegação do menu

        document.addEventListener("click", (event) => {

                    currentLang = selectedLang;

            if (queue.length === 0) return;

            // Obtém o envio pendente mais antigo da fila
            const data = queue[0];

            fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            })
                .then(response => {
                    if (response.ok) {
                        // Remove o item enviado da fila e atualiza o armazenamento
                        queue.shift();
                        localStorage.setItem("contactQueue", JSON.stringify(queue));
                        console.log("Mensagem da fila offline enviada com sucesso!");

                        // Se houver mais itens na fila, processa o seguinte imediatamente
                        if (queue.length > 0) processQueue();
                    }
                })
                .catch(error => {
                    console.log("Processador de fila: O servidor Flask permanece offline.");
                });
        }

        // --- FUNÇÕES DE RENDERIZAÇÃO E INTERFACE ---

        function updateUIStrings() {
            document.querySelectorAll("[data-i18n]").forEach(element => {
                const key = element.getAttribute("data-i18n");
                if (i18n_strings[currentLang] && i18n_strings[currentLang][key]) {
                    element.textContent = i18n_strings[currentLang][key];
                }
            });
        }

        function loadPage(page, animate = true) {
            root.classList.remove("page-404");

            const contentObj = translations[currentLang];
            const titles = {
                home: "Gabriel da Silva | " + i18n_strings[currentLang].nav_home,
                about: "Gabriel da Silva | " + i18n_strings[currentLang].nav_about,
                blog: "Gabriel da Silva | " + i18n_strings[currentLang].nav_blog,
                contact: "Gabriel da Silva | " + i18n_strings[currentLang].nav_contact,
                error: "404 - Not Found"
            };

            const render = () => {
                if (contentObj && contentObj[page]) {
                    root.innerHTML = contentObj[page];
                    document.title = titles[page];
                } else {
                    root.innerHTML = `
                        <div class="error-container card fade-in">
                            <h1 class="accent-text">404</h1>
                            <p>Página não encontrada / Page not found / Seite nicht gefunden</p>
                            <a href="#home" data-page="home" class="primary-btn">Back to Home</a>
                        </div>
                    `;
                    root.classList.add("page-404");
                    document.title = titles.error;
                }

                // Atualiza visualmente a aba de navegação selecionada
                document.querySelectorAll("#nav-list a").forEach(link => {
                    if (link.getAttribute("data-page") === page) {
                        link.classList.add("active-link");
                    } else {
                        link.classList.remove("active-link");
                    }
                });

                if (animate) root.style.opacity = 1;
            };

            if (animate) {
                root.style.opacity = 0;
                setTimeout(render, 200);
            } else {
                render();
            }
        }

        // --- CONTROLE DE COOKIES ---

        function setLanguageCookie(value, days = 1) {
            const d = new Date();
            d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
            const expires = "expires=" + d.toUTCString();
            document.cookie = "user_language=" + value + ";" + expires + ";path=/;SameSite=Lax";
        }

        function getLanguageCookie() {
            const name = "user_language=";
            const decodedCookie = decodeURIComponent(document.cookie);
            const ca = decodedCookie.split(';');
            for (let i = 0; i < ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0) == ' ') {
                    c = c.substring(1);
                }
                if (c.indexOf(name) == 0) {
                    return c.substring(name.length, c.length);
                }
            }
            return "";
        }
    </script>
