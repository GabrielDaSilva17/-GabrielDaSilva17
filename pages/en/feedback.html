<div class="about-section fade-in">
    <h1 class="title-center">Besucher-Feedback</h1>
    <p class="subtitle" style="text-align: center; margin-bottom: 30px; color: var(--text-secondary); font-size: 15px;">Sehen Sie, was die Leute über mein Portfolio und meine Dienstleistungen sagen!</p>
    <div class="contact-feedback-form">
        <form id="feedback-form" class="modern-form" style="max-width: 500px; margin: 0 auto;">
            <div class="input-group">
                <label for="visitor-name">Ihr Name</label>
                <input type="text" id="visitor-name" name="visitor_name" required placeholder="Geben Sie Ihren Namen ein">
            </div>
            <div class="input-group">
                <label for="visitor-email">Ihre E-Mail</label>
                <input type="email" id="visitor-email" name="visitor_email" required placeholder="Geben Sie Ihre E-Mail ein">
            </div>
            <div class="input-group">
                <label for="visitor-feedback">Ihr Feedback</label>
                <textarea id="visitor-feedback" name="visitor_feedback" required placeholder="Hinterlassen Sie hier Ihr Feedback"></textarea>
            </div>
            <button type="submit" class="primary-btn submit-btn">Feedback Senden</button>
        </form>
    </div>
</div>
