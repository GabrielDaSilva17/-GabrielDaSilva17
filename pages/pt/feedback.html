<div class="about-section fade-in">
    <h1 class="title-center">Feedback dos Visitantes</h1>
    <p class="subtitle" style="text-align: center; margin-bottom: 30px; color: var(--text-secondary); font-size: 15px;">Veja o que as pessoas estão dizendo sobre meu portfólio e serviços!</p>
    <div class="contact-feedback-form">
        <form id="feedback-form" class="modern-form" style="max-width: 500px; margin: 0 auto;">
            <div class="input-group">
                <label for="visitor-name">Seu Nome</label>
                <input type="text" id="visitor-name" name="visitor_name" required placeholder="Digite seu nome">
            </div>
            <div class="input-group">
                <label for="visitor-email">Seu E-mail</label>
                <input type="email" id="visitor-email" name="visitor_email" required placeholder="Digite seu e-mail">
            </div>
            <div class="input-group">
                <label for="visitor-feedback">Seu Feedback</label>
                <textarea id="visitor-feedback" name="visitor_feedback" required placeholder="Deixe seu feedback aqui"></textarea>
            </div>
            <button type="submit" class="primary-btn submit-btn">Enviar Feedback</button>
        </form>
    </div>
</div>
